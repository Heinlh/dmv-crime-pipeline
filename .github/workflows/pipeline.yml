name: Daily crime data pipeline

on:
  schedule:
    - cron: "0 11 * * *"  # ~7am ET / 6am during DST, after both agencies publish overnight batches
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  run-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90  # the full-history backfill (cold cache) takes a while
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      # data/ and state/ are gitignored, so the raw parquet zone and the
      # per-source watermarks are carried between daily runs by the Actions
      # cache instead. On a cache hit the extractors pull only the last day
      # or so; on a miss (first run, or cache evicted) they re-backfill the
      # full history from BACKFILL_START, which is slow but safe because
      # every downstream step is idempotent.
      - uses: actions/cache@v4
        with:
          path: |
            data/raw
            state
          key: pipeline-data-${{ github.run_id }}
          restore-keys: pipeline-data-

      - name: Run pipeline (extract, load, transform, export)
        env:
          SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
        run: python run_pipeline.py

      # Runs even if the pipeline step above reported extractor failures,
      # so the site still deploys with whatever data landed.
      - uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: site

      - id: deployment
        if: always()
        uses: actions/deploy-pages@v4
